services:
  - type: web
    name: myanmar-proverbs-ai-tutor-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
